# Talk2STIndex MCP Server Configuration
#
# Configuration priority: environment variables > this file > defaults

server:
  host: 0.0.0.0
  port: 8016
  base_url: http://localhost:8016

oauth:
  discovery_url: https://admin.kaiaperth.com/o/.well-known/openid-configuration
  public_base_url: https://admin.kaiaperth.com/o
  client_id: your-client-id
  client_secret: your-client-secret
  use_introspection: true
  verify_ssl: true
  timeout: 60.0
  protect_mcp: true

rest_auth:
  verify_url: https://admin.kaiaperth.com/authenticate/api/token/verify/
  token: null
  verify_ssl: true
  timeout: 60.0
  cache_ttl_seconds: 30.0

# Cloud LLM API keys — used by stindex for entity extraction
# Environment variables (ANTHROPIC_API_KEY etc.) take precedence if set.
llm:
  anthropic_api_key: your-anthropic-api-key
  openai_api_key: your-openai-api-key
  google_api_key:

# Transport: StreamableHTTP (MCP protocol 2025-03-26)
# - GET /mcp:    SSE stream for server-initiated messages
# - POST /mcp:   JSON-RPC requests
# - DELETE /mcp: Session termination
