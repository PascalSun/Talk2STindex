services:
  talk2stindex-mcp:
    container_name: talk2stindex-mcp
    build:
      context: .
      dockerfile: Dockerfile.mcp.gpu
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    ports:
      - "8016:8016"
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
    command:
      - talk2stindex-mcp
      - sse
      - --host
      - "0.0.0.0"
      - --port
      - "8016"
      - --config
      - /app/config.mcp.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../artifacts/config.mcp.prod.yml:/app/config.mcp.yml:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8016/health >/dev/null"]
      start_period: 30s
      interval: 10s
      timeout: 3s
      retries: 10
